packages:
  - examples/*
  - libs/*

catalogMode: prefer

catalog:
  "@types/node": ^24
  typescript: ^5
  tsx: ^4.20.6
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest

overrides:
  vite: "catalog:"
  vitest: "catalog:"

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
