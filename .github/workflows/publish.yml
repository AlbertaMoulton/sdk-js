name: Publish Package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify
        run: pnpm run ready

      - name: Verify tag matches package version
        run: |
          node -e 'const pkg = require("./libs/sdk/package.json"); const expected = "v" + pkg.version; if (process.env.GITHUB_REF_NAME !== expected) { throw new Error("Tag " + process.env.GITHUB_REF_NAME + " does not match package version " + expected); }'

      - name: Pack SDK
        run: |
          mkdir -p .release
          pnpm --filter @teamgaga/sdk pack --pack-destination "$GITHUB_WORKSPACE/.release"

      - name: Publish SDK
        run: npm publish .release/*.tgz --access public
