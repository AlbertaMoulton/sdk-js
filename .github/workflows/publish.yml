name: Publish Package

on:
  push:
    tags:
      - "v*"
      - "miniapp-jssdk-v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve package from tag
        id: package
        run: |
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const tag = process.env.GITHUB_REF_NAME;
          const packages = [
            {
              prefix: "miniapp-jssdk-v",
              name: "@teamgaga/miniapp-jssdk",
              dir: "libs/miniapp-jssdk",
            },
            {
              prefix: "v",
              name: "@teamgaga/sdk",
              dir: "libs/sdk",
            },
          ];

          const pkg = packages.find((candidate) => tag.startsWith(candidate.prefix));
          if (!pkg) {
            throw new Error(`Unsupported release tag: ${tag}`);
          }

          const version = tag.slice(pkg.prefix.length);
          console.log(`name=${pkg.name}`);
          console.log(`dir=${pkg.dir}`);
          console.log(`version=${version}`);
          NODE

      - name: Verify
        run: pnpm run ready

      - name: Verify tag matches package version
        run: |
          node <<'NODE'
          const pkg = require(`./${process.env.PACKAGE_DIR}/package.json`);
          if (pkg.version !== process.env.PACKAGE_VERSION) {
            throw new Error(`Tag version ${process.env.PACKAGE_VERSION} does not match ${pkg.name} package version ${pkg.version}`);
          }
          NODE
        env:
          PACKAGE_DIR: ${{ steps.package.outputs.dir }}
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}

      - name: Pack package
        run: |
          mkdir -p .release
          pnpm --filter "$PACKAGE_NAME" pack --pack-destination "$GITHUB_WORKSPACE/.release"
        env:
          PACKAGE_NAME: ${{ steps.package.outputs.name }}

      - name: Publish package
        run: npm publish .release/*.tgz --access public
